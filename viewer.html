<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#F5F3EE; --surface:#fff; --surface-2:#F0EDE6;
      --border:#E2DDD5; --border-soft:#EDE9E1;
      --ink:#1A1714; --ink-2:#4A453F; --ink-3:#8C857A;
      --accent:#2D6A4F; --accent-lt:#D8EFE3; --accent-dk:#1B4332;
      --warn:#E07A5F; --warn-lt:#FAE3DC;
      --radius:12px; --radius-lg:18px;
      --shadow-sm:0 1px 3px rgba(26,23,20,.06);
      --shadow:0 4px 16px rgba(26,23,20,.08);
      --shadow-lg:0 12px 40px rgba(26,23,20,.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{font-size:16px;scroll-behavior:smooth;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
    h1,h2,h3{font-family:'Syne',sans-serif;line-height:1.2;}

    /* Header */
    .viewer-header{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:16px 20px;position:sticky;top:0;z-index:10;
    }
    .viewer-header-inner{max-width:640px;margin:0 auto;display:flex;align-items:center;gap:12px;}
    .viewer-brand{display:flex;align-items:center;gap:8px;color:var(--ink-3);font-size:.8rem;font-weight:500;}
    .viewer-brand span{font-size:1.2rem;}
    .viewer-title{flex:1;}
    .viewer-title h1{font-size:1.15rem;font-weight:800;}
    .viewer-meta{font-size:.8rem;color:var(--ink-3);display:flex;gap:10px;margin-top:2px;flex-wrap:wrap;}

    /* Filters */
    .viewer-filters{max-width:640px;margin:16px auto;padding:0 16px;display:flex;flex-wrap:wrap;gap:10px;}
    .search-wrap{position:relative;flex:1;min-width:180px;}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none;}
    .search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);font-family:inherit;font-size:.9rem;color:var(--ink);}
    .search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt);}
    select{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);background:var(--surface);font-family:inherit;font-size:.9rem;color:var(--ink);}
    select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-lt);}

    /* Content */
    .viewer-main{max-width:640px;margin:0 auto;padding:0 16px 100px;}

    .category-group{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow-sm);}
    .cat-header{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--surface-2);border-bottom:1px solid var(--border-soft);}
    .cat-header h3{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-2);flex:1;}
    .cat-badge{font-size:.72rem;padding:2px 8px;border-radius:100px;background:var(--border);color:var(--ink-3);font-weight:600;}
    .item-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border-soft);transition:background .15s;}
    .item-row:last-child{border-bottom:none;}
    .item-row:hover{background:var(--bg);}
    .item-row.checked{opacity:.5;}
    .item-row.checked .item-name{text-decoration:line-through;color:var(--ink-3);}

    .item-checkbox{appearance:none;-webkit-appearance:none;width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;flex:0 0 auto;transition:all .15s;position:relative;}
    .item-checkbox:checked{background:var(--accent);border-color:var(--accent);}
    .item-checkbox:checked::after{content:'';position:absolute;left:5px;top:2px;width:8px;height:12px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);}

    .item-info{flex:1;min-width:0;}
    .item-name{font-size:.92rem;font-weight:400;display:block;}
    .item-shop-tag{display:inline-block;font-size:.68rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:var(--accent-lt);color:var(--accent-dk);padding:2px 7px;border-radius:100px;margin-top:3px;}

    .item-qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
    .item-qty-input{width:64px;padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;text-align:center;font-size:.85rem;background:var(--bg);font-family:inherit;}
    .item-qty-input:focus{outline:none;border-color:var(--accent);}
    .item-unit{font-size:.78rem;color:var(--ink-3);font-weight:500;}

    /* Summary */
    .summary-bar{position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:16px;font-size:.85rem;font-weight:500;z-index:10;box-shadow:0 -4px 20px rgba(0,0,0,.15);}
    .summary-bar.hidden{display:none;}
    .progress-bar{width:120px;height:4px;background:rgba(255,255,255,.25);border-radius:100px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--accent-lt);border-radius:100px;transition:width .3s ease;width:0%;}

    /* States */
    .loading-state,.empty-state{text-align:center;padding:60px 20px;color:var(--ink-3);}
    .spinner{width:24px;height:24px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-bottom:12px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty-icon{font-size:3rem;margin-bottom:16px;}
    .hidden{display:none;}

    /* Sort select */
    .viewer-sort{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--ink-3);}
    .viewer-sort select{font-size:.8rem;padding:6px 10px;}

    @media(max-width:480px){
      .viewer-filters{flex-direction:column;}
      .summary-bar{flex-direction:column;gap:8px;padding:12px 16px;}
    }
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:100px;}
  </style>
</head>
<body>

  <header class="viewer-header">
    <div class="viewer-header-inner">
      <div class="viewer-brand"><span>🛒</span> Guia de Compras</div>
      <div class="viewer-title">
        <h1 id="v-title">A carregar…</h1>
        <div class="viewer-meta">
          <span id="v-date"></span>
          <span id="v-shop"></span>
        </div>
      </div>
    </div>
  </header>

  <div class="viewer-filters">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="v-search" placeholder="Filtrar produto…" />
    </div>
    <select id="v-shop-filter"></select>
    <div class="viewer-sort">
      <select id="v-sort">
        <option value="categoria">Por categoria</option>
        <option value="supermercado">Por supermercado</option>
      </select>
    </div>
  </div>

  <main class="viewer-main">
    <div id="v-loading" class="loading-state">
      <div class="spinner"></div>
      <p>A carregar lista…</p>
    </div>
    <div id="v-error" class="empty-state hidden">
      <div class="empty-icon">⚠️</div>
      <p id="v-error-msg">Lista não encontrada.</p>
    </div>
    <div id="v-content"></div>
  </main>

  <div id="v-summary" class="summary-bar hidden">
    <span><strong id="v-checked">0</strong> / <span id="v-total">0</span> itens marcados</span>
    <div class="progress-bar"><div id="v-progress" class="progress-fill"></div></div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyCGzgFbleV3H6tZpOEW0voPke0LY9VTJs8",
  authDomain:        "guia-de-compras-2f883.firebaseapp.com",
  projectId:         "guia-de-compras-2f883",
  storageBucket:     "guia-de-compras-2f883.firebasestorage.app",
  messagingSenderId: "375038437557",
  appId:             "1:375038437557:web:f3e21dc6f40b2a04e076fc"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const params  = new URLSearchParams(location.search);
const listaId = params.get("lista");

function formatDatePT(s) { if(!s) return ""; const [y,m,d]=s.split("-"); return `${d}/${m}/${y}`; }

let currentData = null;

function getFilters() {
  return {
    search: document.getElementById("v-search").value.toLowerCase().trim(),
    shop:   document.getElementById("v-shop-filter").value,
    sort:   document.getElementById("v-sort").value,
  };
}

function populateShopFilter(data) {
  const shops = new Set();
  Object.values(data.items||{}).forEach(it => { if(it.bestShop) shops.add(it.bestShop); });
  const sel = document.getElementById("v-shop-filter");
  const val = sel.value;
  sel.innerHTML = '<option value="">Todos os supermercados</option>' +
    [...shops].sort().map(s=>`<option value="${s}">${s}</option>`).join("");
  sel.value = val;
}

function render(data) {
  currentData = data;
  const {search, shop, sort} = getFilters();
  const container = document.getElementById("v-content");
  container.innerHTML = "";

  let entries = Object.entries(data.items||{}).filter(([,item]) =>
    (!search || item.name.toLowerCase().includes(search)) &&
    (!shop   || item.bestShop === shop)
  );

  const byGroup={};
  entries.forEach(([itemId,item]) => {
    const key = sort==="supermercado" ? (item.bestShop||"Sem supermercado") : (item.categoria||"Sem categoria");
    if(!byGroup[key]) byGroup[key]=[];
    byGroup[key].push({itemId,...item});
  });

  Object.entries(byGroup).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([groupName,items])=>{
    const group = document.createElement("div");
    group.className="category-group";
    const checked=items.filter(i=>i.checked).length;
    group.innerHTML=`<div class="cat-header"><h3>${groupName}</h3><span class="cat-badge">${checked}/${items.length}</span></div>`;
    items.sort((a,b)=>a.name.localeCompare(b.name)).forEach(item=>{
      const row=document.createElement("div");
      row.className=`item-row${item.checked?" checked":""}`;
      row.innerHTML=`
        <input type="checkbox" class="item-checkbox" ${item.checked?"checked":""} />
        <div class="item-info">
          <span class="item-name">${item.name}</span>
          ${item.bestShop?`<span class="item-shop-tag">${item.bestShop}</span>`:""}
        </div>
        <div class="item-qty-wrap">
          <input type="number" class="item-qty-input" value="${item.qty}" min="0" step="0.1" />
          <span class="item-unit">${item.unit}</span>
        </div>`;
      const cb=row.querySelector(".item-checkbox");
      cb.addEventListener("change",async()=>{
        row.classList.toggle("checked",cb.checked);
        const upd={}; upd[`items.${item.itemId}.checked`]=cb.checked;
        await updateDoc(doc(db,"listas",listaId),upd);
      });
      const qi=row.querySelector(".item-qty-input");
      let timer;
      qi.addEventListener("input",()=>{ clearTimeout(timer); timer=setTimeout(async()=>{
        const upd={}; upd[`items.${item.itemId}.qty`]=parseFloat(qi.value)||0;
        await updateDoc(doc(db,"listas",listaId),upd);
      },600); });
      group.appendChild(row);
    });
    container.appendChild(group);
  });

  // Summary
  const all=Object.values(data.items||{}), chk=all.filter(i=>i.checked).length, tot=all.length;
  document.getElementById("v-checked").textContent=chk;
  document.getElementById("v-total").textContent=tot;
  document.getElementById("v-progress").style.width=`${tot?(chk/tot)*100:0}%`;
  document.getElementById("v-summary").classList.toggle("hidden",tot===0);
}

if (!listaId) {
  document.getElementById("v-loading").classList.add("hidden");
  document.getElementById("v-error").classList.remove("hidden");
  document.getElementById("v-error-msg").textContent="Link inválido — nenhuma lista especificada.";
} else {
  onSnapshot(doc(db,"listas",listaId), snap => {
    document.getElementById("v-loading").classList.add("hidden");
    if (!snap.exists()) {
      document.getElementById("v-error").classList.remove("hidden");
      document.getElementById("v-error-msg").textContent="Lista não encontrada ou foi eliminada.";
      return;
    }
    const data = {id:snap.id,...snap.data()};
    document.title = `${data.nome||"Lista"} · Guia de Compras`;
    document.getElementById("v-title").textContent = data.nome || formatDatePT(data.date) || "Lista";
    document.getElementById("v-date").textContent  = formatDatePT(data.date);
    document.getElementById("v-shop").textContent  = data.supermercado ? `🛍️ ${data.supermercado}` : "";
    populateShopFilter(data);
    render(data);
  });
}

["v-search","v-shop-filter","v-sort"].forEach(id=>{
  document.getElementById(id).addEventListener(id==="v-search"?"input":"change",()=>{
    if(currentData) render(currentData);
  });
});
</script>
</body>
</html>
